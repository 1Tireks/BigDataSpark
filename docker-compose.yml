services:
  postgres:
    image: postgres:16
    container_name: bigdata2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bigdata_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - "./исходные данные:/csv_data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bigdata_lab"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bigdata2

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: bigdata2_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: marts
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bigdata2

  spark:
    image: apache/spark:3.5.3-python3
    container_name: bigdata2_spark
    restart: unless-stopped
    command: ["sleep", "infinity"]
    user: root
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: bigdata_lab
      PG_USER: postgres
      PG_PASSWORD: postgres
      CH_HOST: clickhouse
      CH_PORT: "8123"
      CH_DB: marts
    volumes:
      - ./spark/jobs:/jobs
      - spark_ivy:/tmp/.ivy2
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - bigdata2

networks:
  bigdata2:
    driver: bridge

volumes:
  postgres_data:
  clickhouse_data:
  spark_ivy:
